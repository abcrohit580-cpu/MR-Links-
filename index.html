body{
margin:0;
background:linear-gradient(135deg,#050008,#25004d);
font-family:Arial,sans-serif;
color:white;
text-align:center;
overflow-x:hidden;
}


/* Floating Logos */

.floating{
position:fixed;
inset:0;
z-index:0;
overflow:hidden;
pointer-events:none;
}

.floating i{
position:absolute;
font-size:90px;
opacity:.06;
animation:float 15s infinite linear;
}


.floating i:nth-child(1){left:10%;top:15%;}
.floating i:nth-child(2){left:75%;top:20%;animation-delay:3s;}
.floating i:nth-child(3){left:20%;top:70%;animation-delay:6s;}
.floating i:nth-child(4){left:80%;top:65%;animation-delay:9s;}
.floating i:nth-child(5){left:45%;top:40%;animation-delay:12s;}


@keyframes float{
0%{transform:translateY(0) rotate(0deg);}
50%{transform:translateY(-100px) rotate(180deg);}
100%{transform:translateY(0) rotate(360deg);}
}



.container{
position:relative;
z-index:2;
max-width:450px;
margin:auto;
padding:30px 20px;
}



.profile{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:3px solid #b000ff;
box-shadow:0 0 30px #b000ff;
}



h1{
font-size:35px;
margin:15px 0 5px;
}



.badge{
display:inline-block;
padding:8px 18px;
border-radius:20px;
background:#150020;
border:1px solid #ff00ff;
box-shadow:0 0 20px #ff00ff;
}



p{
color:#ccc;
}



.link{

display:flex;
align-items:center;
justify-content:center;
gap:15px;

margin:15px 0;
padding:16px;

background:rgba(18,0,31,.85);

color:white;

text-decoration:none;

border-radius:18px;

font-size:18px;

border:1px solid #8000ff;

transition:.3s;

backdrop-filter:blur(5px);

}



.link i{
font-size:28px;
}



.link:hover{
transform:translateY(-5px) scale(1.03);
}



.instagram{
border-color:#ff00aa;
box-shadow:0 0 20px #ff00aa;
}


.youtube{
border-color:red;
box-shadow:0 0 20px red;

.whatsapp{

.coming{

box-shadow:0 0 25px #ff00ff;

.footer{
margin-top:30px;

}
